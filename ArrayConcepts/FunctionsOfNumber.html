<!DOCTYPE html> 
<html>
    <head>
        <title>Call By Value</title>
        <script src="Js.file/FunctionsOfNumber.js" defer></script>
    </head>
    <body>
        <label>First Number</label>
        <input id="txtFirstNumber" type="number">
        <label>Second Number</label>
        <input id="txtSecondNumber" type="number">
        <button id="btnAdd" onclick="onClickAddition()">Add</button>
        <p id="pAddResult"></p>
        <button id="btnSub" onclick="onClickSubtraction()">Sub</button>
        <p id="pSubResult"></p>
        <button id="btnMultiple" onclick="onClickMultiplication()">Multiple</button>
        <p id="pMultipleResult"></p>
        <button id="btnDiv" onclick="onClickDivision()">Division</button>
        <p id="pDivisionResult"></p>
        <button id="btnRem" onclick="onClickRemainder()">Remainder</button>
        <p id="pRemainderResult"></p>
        </body>
</html>
